name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write # OIDC token for Terraform Cloud / GCP

env:
  TERRAFORM_VERSION: "1.9.8"
  TERRAGRUNT_VERSION: "0.67.0"
  TF_PLUGIN_CACHE_DIR: ${{ github.workspace }}/.terraform-plugin-cache

jobs:
  # ── Discover zones that have domains configured ───────────────────────────
  detect-zones:
    name: Detect zones
    runs-on: ubuntu-24.04
    outputs:
      zones: ${{ steps.detect.outputs.zones }}

    steps:
      - uses: actions/checkout@v4
      - name: List zones with domains
        id: detect
        run: bash .github/scripts/detect-zones.sh

  # ── Plan: parallel across all zones (max 5 concurrent) ───────────────────
  plan:
    name: Plan / ${{ matrix.zone }}
    needs: detect-zones
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        zone: ${{ fromJson(needs.detect-zones.outputs.zones) }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform ${{ env.TERRAFORM_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Install Terragrunt
        run: bash .github/scripts/install-terragrunt.sh "${{ env.TERRAGRUNT_VERSION }}"

      - name: Cache Terraform plugins
        uses: actions/cache@v4
        with:
          path: ${{ env.TF_PLUGIN_CACHE_DIR }}
          key: tf-plugins-${{ env.TERRAFORM_VERSION }}-${{ hashFiles('**/versions.tf') }}
          restore-keys: tf-plugins-${{ env.TERRAFORM_VERSION }}-

      - name: Plan — ${{ matrix.zone }}
        id: plan
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          TF_CLOUD_ORGANIZATION: ${{ vars.TF_CLOUD_ORGANIZATION }}
        run: |
          mkdir -p "$TF_PLUGIN_CACHE_DIR"
          cd "envs/cloudflare/zones/${{ matrix.zone }}"
          terragrunt plan -out=tfplan --terragrunt-non-interactive 2>&1 | tee /tmp/plan.log

          echo "### Plan: ${{ matrix.zone }}" >> "$GITHUB_STEP_SUMMARY"
          if grep -q "No changes." /tmp/plan.log; then
            echo "no_changes=true" >> "$GITHUB_OUTPUT"
            echo "⬛ No changes." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "no_changes=false" >> "$GITHUB_OUTPUT"
            echo '```hcl' >> "$GITHUB_STEP_SUMMARY"
            grep -A 999 "Terraform will perform" /tmp/plan.log | head -60 >> "$GITHUB_STEP_SUMMARY" || true
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload plan artifact
        if: steps.plan.outputs.no_changes == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ matrix.zone }}-${{ github.run_id }}
          path: envs/cloudflare/zones/${{ matrix.zone }}/tfplan
          retention-days: 7
          if-no-files-found: ignore

  # ── Apply: sequential, manual approval via GitHub Environment ────────────
  apply:
    name: Apply / ${{ matrix.zone }}
    needs: [detect-zones, plan]
    runs-on: ubuntu-24.04
    environment: production # required reviewers configured in GitHub repo settings
    strategy:
      fail-fast: false
      max-parallel: 1 # apply zones one at a time
      matrix:
        zone: ${{ fromJson(needs.detect-zones.outputs.zones) }}
    # Prevent concurrent applies across workflow runs
    concurrency:
      group: terraform-apply-${{ matrix.zone }}
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform ${{ env.TERRAFORM_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Install Terragrunt
        run: bash .github/scripts/install-terragrunt.sh "${{ env.TERRAGRUNT_VERSION }}"

      - name: Cache Terraform plugins
        uses: actions/cache@v4
        with:
          path: ${{ env.TF_PLUGIN_CACHE_DIR }}
          key: tf-plugins-${{ env.TERRAFORM_VERSION }}-${{ hashFiles('**/versions.tf') }}
          restore-keys: tf-plugins-${{ env.TERRAFORM_VERSION }}-

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ matrix.zone }}-${{ github.run_id }}
          path: envs/cloudflare/zones/${{ matrix.zone }}/
        continue-on-error: true # zone may have no changes

      - name: Apply — ${{ matrix.zone }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          TF_CLOUD_ORGANIZATION: ${{ vars.TF_CLOUD_ORGANIZATION }}
        run: |
          ZONE_DIR="envs/cloudflare/zones/${{ matrix.zone }}"
          if [ ! -f "${ZONE_DIR}/tfplan" ]; then
            echo "No plan artifact for ${{ matrix.zone }} — no changes, skipping."
            exit 0
          fi

          cd "$ZONE_DIR"
          terragrunt apply tfplan --terragrunt-non-interactive

          echo "### Applied: ${{ matrix.zone }} ✅" >> "$GITHUB_STEP_SUMMARY"
